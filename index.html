<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App 💬</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif
        }

        body {
            height: 100vh;
            display: flex;
            background: #111;
            color: #fff;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #1f1f1f;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .room {
            padding: 10px;
            background: #2a2a2a;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .room:hover {
            background: #3a3a3a
        }

        /* Chat */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .msg {
            background: #3b82f6;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            max-width: 70%;
        }

        .inputBox {
            display: flex;
            padding: 10px;
            background: #1f1f1f;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 5px;
            padding: 8px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .send {
            background: #22c55e;
            color: #fff
        }

        .delete {
            background: #ef4444;
            color: #fff
        }

        /* Center screen */
        .centerScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .centerScreen input {
            margin: 10px 0;
        }

        /* Mobile */
        @media(max-width:700px) {
            .sidebar {
                width: 80px
            }

            .room span {
                display: none
            }
        }
    </style>
</head>

<body>

    <!-- Center Create Room -->
    <div class="centerScreen" id="startScreen">
        <h2>💬 Create Chat Room</h2>
        <input id="roomInput" placeholder="Enter room name">
        
        <br>
        <button onclick="createRoom()">Create</button>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar" style="display:none;">
        <h3>Chats</h3>
        <div id="rooms"></div>
        <button onclick="createRoom()">➕ New</button>
    </div>

    <!-- Chat -->
    <div class="chat" id="chat" style="display:none;">
        <div class="messages" id="messages"></div>

        <div class="inputBox">
            <br>
        <button onclick="copyLink()">🔗</button>
            <input id="msgInput" placeholder="Type message...">
            <button class="send" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRIYlVPWK1lAtzks7KHjSUO2ZrbXtV_xU",
            authDomain: "notepad-2fc8f.firebaseapp.com",
            databaseURL: "https://notepad-2fc8f-default-rtdb.firebaseio.com",
            projectId: "notepad-2fc8f",
            storageBucket: "notepad-2fc8f.firebasestorage.app",
            messagingSenderId: "1090003270444",
            appId: "1:1090003270444:web:0184878b11a1549b428a89"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentRoom = null;
        let unsubscribe = null;

        // 🔗 URL ROOM
        const params = new URLSearchParams(window.location.search);
        let roomFromURL = params.get("room");

        // 💾 local rooms
        let rooms = JSON.parse(localStorage.getItem("rooms") || "[]");
        let lastRoom = localStorage.getItem("lastRoom");

        // 👉 Decide room
        if (roomFromURL) {
            currentRoom = roomFromURL;
            if (!rooms.includes(currentRoom)) {
                rooms.push(currentRoom);
                localStorage.setItem("rooms", JSON.stringify(rooms));
            }
        } else if (lastRoom) {
            currentRoom = lastRoom;
            window.location.search = "?room=" + currentRoom;
        }

        // 👉 init
        if (rooms.length) {
            initApp();
            if (currentRoom) openRoom(currentRoom);
        }

        // UI init
        function initApp() {
            document.getElementById("startScreen").style.display = "none";
            document.getElementById("sidebar").style.display = "flex";
            document.getElementById("chat").style.display = "flex";
            renderRooms();
        }

        // 🆕 Create Room
        function createRoom() {
            let name = document.getElementById("roomInput").value || "room-" + Math.random().toString(36).substr(2, 5);

            if (!rooms.includes(name)) {
                rooms.push(name);
                localStorage.setItem("rooms", JSON.stringify(rooms));
            }

            window.location.search = "?room=" + name;
        }

        // 📂 Render rooms
        function renderRooms() {
            const container = document.getElementById("rooms");
            container.innerHTML = "";

            rooms.forEach(r => {
                let div = document.createElement("div");
                div.className = "room";

                div.innerHTML = `
<span>${r}</span>
<button class="delete">x</button>
`;

                div.onclick = () => openRoom(r);

                div.querySelector(".delete").onclick = (e) => {
                    e.stopPropagation();
                    deleteRoom(r);
                };

                container.appendChild(div);
            });
        }

        // 🔓 Open Room
        function openRoom(room) {
            currentRoom = room;
            localStorage.setItem("lastRoom", room);

            // update URL
            history.replaceState(null, "", "?room=" + room);

            // clear old listener
            if (unsubscribe) unsubscribe();

            document.getElementById("messages").innerHTML = "";

            // attach new listener
            unsubscribe = db.collection("rooms").doc(room).collection("msgs")
                .orderBy("time")
                .onSnapshot(snap => {
                    const box = document.getElementById("messages");
                    box.innerHTML = "";

                    snap.forEach(doc => {
                        let m = doc.data();
                        let div = document.createElement("div");
                        div.className = "msg";
                        div.innerText = m.text + " 🕒 " + new Date(m.time).toLocaleTimeString();

                        box.appendChild(div);
                    });

                    box.scrollTop = box.scrollHeight;
                });
        }

        // 📤 Send message
        function sendMsg() {
            const input = document.getElementById("msgInput");
            if (!input.value.trim()) return;

            db.collection("rooms").doc(currentRoom).collection("msgs").add({
                text: input.value,
                time: Date.now()
            });

            input.value = "";
        }

        // 🔗 Copy share link
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied 🔗");
        }

        // ❌ Delete room
        function deleteRoom(room) {
            if (!confirm("Delete room?")) return;

            db.collection("rooms").doc(room).collection("msgs").get()
                .then(snap => {
                    snap.forEach(doc => doc.ref.delete());
                });

            db.collection("rooms").doc(room).delete();

            rooms = rooms.filter(r => r !== room);
            localStorage.setItem("rooms", JSON.stringify(rooms));

            renderRooms();

            if (currentRoom === room) {
                document.getElementById("messages").innerHTML = "";
            }
        }
    </script>

</body>

</html>
